<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceSentrix | Advanced Emotion HUD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <h1>FaceSentrix</h1>
                <div class="system-status">
                    <span class="status-dot"></span>
                    System: Online | Neural Link: Stable
                </div>
            </div>
            <div class="system-status" style="text-align: right;">
                V.0.1.2 // PROTOCOL: EMOTION_SCAN<br>
                <span id="timestamp">2026.04.30 // 20:38:21</span>
            </div>
        </header>

        <div class="main-view">
            <!-- Left Side: HUD Video Frame -->
            <div class="hud-frame">
                <div class="corner tl"></div>
                <div class="corner tr"></div>
                <div class="corner bl"></div>
                <div class="corner br"></div>
                
                <video id="webcam-feed" autoplay playsinline></video>
                <canvas id="overlay"></canvas>
            </div>

            <!-- Right Side: Control Panels -->
            <div class="hud-panel">
                <div class="panel-card">
                    <h2>01 // Real-Time Biometrics</h2>
                    <div id="metric-container">
                        <!-- Bars will be injected here by JS -->
                    </div>
                </div>

                <div class="panel-card">
                    <h2>02 // System Telemetry</h2>
                    <div id="telemetry-info">
                        <div class="metric-header"><span>Core Latency</span><span id="inf-val">---</span></div>
                        <div class="metric-header"><span>Target Resolution</span><span id="res-val">---</span></div>
                        <div class="metric-header"><span>Active Targets</span><span id="face-count">0</span></div>
                    </div>
                </div>

                <div class="hud-controls">
                    <button id="toggle-cam" class="hud-btn active-btn">Deactivate Stream</button>
                    <button id="capture-btn" class="hud-btn">Snapshot</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Real-time HUD clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('timestamp').innerText = 
                now.getFullYear() + "." + 
                String(now.getMonth() + 1).padStart(2, '0') + "." + 
                String(now.getDate()).padStart(2, '0') + " // " + 
                String(now.getHours()).padStart(2, '0') + ":" + 
                String(now.getMinutes()).padStart(2, '0') + ":" + 
                String(now.getSeconds()).padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
